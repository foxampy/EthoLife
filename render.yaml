services:
  - type: web
    name: ethoslife
    env: node
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    buildEnv:
      # Vite build-time variables
      NODE_ENV: production
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # Auth
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      # AI APIs
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: QWEN_API_KEY
        sync: false
      # Payments
      - key: NOWPAYMENTS_API_KEY
        sync: false
      # Telegram
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        value: https://etholife.onrender.com
    healthCheckPath: /health
